name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  relay-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r desktop_client/requirements.txt

      - name: Verify Python modules compile
        run: |
          python3 -m py_compile \
            twoman_protocol.py \
            twoman_transport.py \
            local_client/helper.py \
            hidden_server/agent.py \
            host/runtime/http_broker_daemon.py \
            desktop_client/models.py \
            desktop_client/runtime.py \
            desktop_client/controller.py \
            desktop_client/socks_gateway.py \
            desktop_client/tui.py \
            twoman_control/*.py \
            tests/test_transport_proxy.py \
            tests/test_twoman_control_cpanel.py \
            tests/test_twoman_control_installer.py \
            tests/test_twoman_control_manager.py

      - name: Verify shell scripts parse
        run: |
          bash -n \
            scripts/install_twoman.sh \
            scripts/install_hidden_server_local.sh \
            scripts/deploy_hidden_server.sh \
            scripts/deploy_host.sh \
            scripts/deploy_host_node_selector.sh \
            scripts/deploy_host_passenger.sh

      - name: Run bridge backend smoke test
        run: bash tests/run_e2e.sh

      - name: Run node backend smoke test
        run: bash tests/run_e2e_node_http.sh

      - name: Run desktop TUI tests
        run: python3 -m unittest tests/test_desktop_client_tui.py

      - name: Run installer and transport tests
        run: python3 -m unittest tests.test_transport_proxy tests.test_twoman_control_cpanel tests.test_twoman_control_installer tests.test_twoman_control_manager

      - name: Run desktop client end-to-end test
        run: bash tests/run_desktop_client_e2e.sh

      - name: Build frozen Linux desktop client
        run: ./desktop_client/build_linux.sh

  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: android-client/requirements-chaquopy.txt

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Android debug APK
        working-directory: android-client
        run: ./gradlew assembleArm64Debug
